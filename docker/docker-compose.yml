# Example docker-compose for delivery_drone. Broker (Kafka/MQTT) expected on drones_net.
# Use with: docker compose -f docker/docker-compose.yml --env-file docker/example.env up

services:
  delivery_drone:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - COMPONENT_ID=${COMPONENT_ID:-delivery_drone}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - HEALTH_PORT=${HEALTH_PORT:-8080}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - BROKER_USER=${BROKER_USER:-}
      - BROKER_PASSWORD=${BROKER_PASSWORD:-}
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
