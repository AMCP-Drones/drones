# AUTO-GENERATED by scripts/prepare_system.py
# Do not edit manually. Re-run: python scripts/prepare_system.py systems/deliverydron
name: drones
services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    profiles:
    - kafka
    ports:
    - ${KAFKA_PORT:-9092}:9092
    - ${KAFKA_INTERNAL_PORT:-29092}:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:${KAFKA_PORT:-9092},SASL_PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_PLAINTEXT_INTERNAL:SASL_PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT_INTERNAL
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OPTS: -Djava.security.auth.login.config=/tmp/jaas.conf
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COMPONENT_USER_A: ${COMPONENT_USER_A:-}
      COMPONENT_PASSWORD_A: ${COMPONENT_PASSWORD_A:-}
    volumes:
    - ../../../docker/kafka/entrypoint.sh:/entrypoint.sh:ro
    command:
    - /bin/sh
    - /entrypoint.sh
    networks:
    - drones_net
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f java || exit 1
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    user: 0:0
    profiles:
    - mqtt
    ports:
    - ${MQTT_PORT:-1883}:1883
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COMPONENT_USER_A: ${COMPONENT_USER_A:-}
      COMPONENT_PASSWORD_A: ${COMPONENT_PASSWORD_A:-}
    volumes:
    - ../../../docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    - ../../../docker/mqtt/entrypoint.sh:/entrypoint.sh:ro
    command:
    - /bin/sh
    - /entrypoint.sh
    networks:
    - drones_net
    healthcheck:
      test:
      - CMD-SHELL
      - mosquitto_pub -h localhost -u $$ADMIN_USER -P $$ADMIN_PASSWORD -t healthcheck
        -m ok
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
  security_monitor:
    build:
      context: ../../..
      dockerfile: ../../../components/security_monitor/docker/Dockerfile
    profiles:
    - kafka
    - mqtt
    environment:
    - TOPIC_VERSION=${TOPIC_VERSION:-v1}
    - INSTANCE_ID=${INSTANCE_ID:-Delivery001}
    - SYSTEM_NAME=${SECURITY_MONITOR_SYSTEM_NAME:-deliverydron}
    - COMPONENT_ID=${SECURITY_MONITOR_COMPONENT_ID:-security_monitor}
    - COMPONENT_TOPIC=${SECURITY_MONITOR_COMPONENT_TOPIC:-}
    - BROKER_TYPE=${BROKER_TYPE:-kafka}
    - BROKER_USER=${SECURITY_MONITOR_BROKER_USER:-${ADMIN_USER}}
    - BROKER_PASSWORD=${SECURITY_MONITOR_BROKER_PASSWORD:-${ADMIN_PASSWORD}}
    - SECURITY_POLICIES=${SECURITY_MONITOR_SECURITY_POLICIES:-}
    - SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S=${SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S:-10.0}
    - MQTT_BROKER=mosquitto
    - MQTT_PORT=1883
    - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
    - drones_net
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
        required: false
      mosquitto:
        condition: service_healthy
        required: false
